<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic-Tac-Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 0.1em;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.5em;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 10px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      box-shadow: 0 0 20px rgba(233, 69, 96, 0.6);
    }

    #reset {
      margin-top: 2rem;
      padding: 0.7rem 2rem;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      background: #e94560;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    #reset:hover {
      background: #c73652;
      transform: scale(1.05);
    }

    #scores {
      display: flex;
      gap: 2rem;
      margin-bottom: 1.5rem;
      font-size: 1rem;
    }

    .score-box {
      text-align: center;
      background: #16213e;
      padding: 0.5rem 1.2rem;
      border-radius: 8px;
    }

    .score-box span {
      display: block;
      font-size: 1.5rem;
      font-weight: bold;
    }

    .score-box.x-score span { color: #e94560; }
    .score-box.o-score span { color: #a8dadc; }
    .score-box.draw-score span { color: #aaa; }
  </style>
</head>
<body>
  <h1>Tic-Tac-Toe</h1>

  <div id="scores">
    <div class="score-box x-score">X <span id="x-score">0</span></div>
    <div class="score-box draw-score">Draws <span id="draw-score">0</span></div>
    <div class="score-box o-score">O <span id="o-score">0</span></div>
  </div>

  <div id="status">X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <button id="reset">New Game</button>

  <script>
    const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');
    const scores = { X: 0, O: 0, Draw: 0 };

    let board = Array(9).fill(null);
    let current = 'X';
    let gameOver = false;

    cells.forEach(cell => cell.addEventListener('click', () => {
      const i = +cell.dataset.i;
      if (gameOver || board[i]) return;

      board[i] = current;
      cell.textContent = current;
      cell.classList.add(current.toLowerCase(), 'taken');

      const winLine = getWin();
      if (winLine) {
        winLine.forEach(idx => cells[idx].classList.add('win'));
        status.textContent = `${current} wins!`;
        scores[current]++;
        updateScores();
        gameOver = true;
      } else if (board.every(Boolean)) {
        status.textContent = "It's a draw!";
        scores.Draw++;
        updateScores();
        gameOver = true;
      } else {
        current = current === 'X' ? 'O' : 'X';
        status.textContent = `${current}'s turn`;
      }
    }));

    document.getElementById('reset').addEventListener('click', reset);

    function getWin() {
      return WINS.find(([a, b, c]) => board[a] && board[a] === board[b] && board[a] === board[c]) || null;
    }

    function updateScores() {
      document.getElementById('x-score').textContent = scores.X;
      document.getElementById('o-score').textContent = scores.O;
      document.getElementById('draw-score').textContent = scores.Draw;
    }

    function reset() {
      board = Array(9).fill(null);
      current = 'X';
      gameOver = false;
      status.textContent = "X's turn";
      cells.forEach(c => {
        c.textContent = '';
        c.className = 'cell';
      });
    }
  </script>
</body>
</html>
