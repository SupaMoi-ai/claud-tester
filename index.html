<style>
  :root{
    --paper:#F7F4EC; --ink:#1C1B17;
    --zone-free:#3A8A4A; --zone-limited:#C68A1F; --zone-restricted:#B0463C;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;background:var(--paper);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;overflow:hidden;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) 0 env(safe-area-inset-left);}
  button{font:inherit;color:inherit;cursor:pointer}
  a{color:inherit}
  .no-scrollbar::-webkit-scrollbar{display:none}
  .no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
  #map{position:fixed;inset:0;background:#EDEDED}
  .leaflet-container{background:#EDEDED;font-family:inherit}
  .leaflet-tile-pane{filter:grayscale(1) contrast(.78) brightness(1.12);opacity:.75}
  .leaflet-control-attribution{background:rgba(247,244,236,.85)!important;color:#1C1B17!important;font-size:10px!important}
  .leaflet-control-attribution a{color:#1C1B17}
  .leaflet-bar a{background:rgba(247,244,236,.95);color:#1C1B17;border-color:rgba(28,27,23,.15)}
  .leaflet-bar a:hover{background:rgba(247,244,236,1)}
  #errorOverlay{position:fixed;top:0;left:0;right:0;z-index:60;background:#B0463C;color:#fff;font-size:12px;
    padding:10px 14px;display:none;line-height:1.4}
  #errorOverlay code{background:rgba(0,0,0,.18);padding:1px 5px;border-radius:4px;font-size:11px}

  header.app{position:fixed;top:env(safe-area-inset-top);left:0;right:0;z-index:20;pointer-events:none;
    display:flex;flex-direction:column;gap:8px;padding:10px 12px 0}
  header.app > *{pointer-events:auto;max-width:560px;margin:0 auto;width:100%}
  .row{display:flex;gap:8px;align-items:center}
  .logo{flex:0 0 auto;background:rgba(247,244,236,.95);border:1px solid rgba(28,27,23,.1);
    border-radius:9999px;padding:8px 12px;font-size:14px;font-weight:600;line-height:1}
  .search{flex:1 1 auto;position:relative}
  .search input{width:100%;background:rgba(247,244,236,.95);border:1px solid rgba(28,27,23,.1);
    border-radius:9999px;padding:9px 16px;font-size:14px;outline:none;color:var(--ink)}
  .search input:focus{border-color:rgba(28,27,23,.4)}
  .search ul{position:absolute;left:0;right:0;top:calc(100% + 4px);background:var(--paper);
    border:1px solid rgba(28,27,23,.1);border-radius:12px;list-style:none;margin:0;padding:4px 0;
    max-height:280px;overflow-y:auto;z-index:30}
  .search li button{display:block;width:100%;text-align:left;background:transparent;border:0;
    padding:8px 12px;font-size:13px;border-radius:0}
  .search li button:hover{background:rgba(28,27,23,.05)}
  .chips{display:flex;gap:8px;overflow-x:auto;padding:2px 0;align-items:center}
  .chip{flex:0 0 auto;background:rgba(247,244,236,.95);border:1px solid rgba(28,27,23,.15);
    border-radius:9999px;padding:6px 12px;font-size:12px}
  .chip.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .filter-pop{display:flex;align-items:center;gap:8px}
  .filter-pop > summary{list-style:none;cursor:pointer;background:rgba(247,244,236,.95);
    border:1px solid rgba(28,27,23,.15);border-radius:9999px;padding:6px 12px;font-size:12px;
    flex:0 0 auto;white-space:nowrap}
  .filter-pop > summary::-webkit-details-marker{display:none}
  .filter-pop[open] > summary{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .filter-pop > .chips{flex:1 1 auto;margin-left:0}
  .filter-pop:not([open]) > .chips{display:none}
  .nearme{flex:0 0 auto;background:rgba(247,244,236,.95);border:1px solid rgba(28,27,23,.15);
    border-radius:9999px;padding:6px 12px;font-size:12px;cursor:pointer}
  .nearme.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}

  #pinnedBar{position:fixed;top:env(safe-area-inset-top);left:0;right:0;z-index:25;
    background:var(--zone-free);color:#fff;padding:8px 14px;font-size:13px;display:none;
    align-items:center;justify-content:space-between;gap:10px;cursor:pointer;
    box-shadow:0 1px 0 rgba(0,0,0,.06)}
  #pinnedBar .name{font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1 1 auto}
  #pinnedBar .left{font-variant-numeric:tabular-nums;font-size:12px;opacity:.95}
  #pinnedBar.shown{display:flex}
  body.pinned header.app{top:calc(env(safe-area-inset-top) + 36px)}
  body.pinned .legend{top:calc(154px + env(safe-area-inset-top))}

  .pulse-ring{animation:parkingPulse 1.8s ease-out infinite}
  @keyframes parkingPulse{
    0%{stroke-opacity:.85;r:9}
    100%{stroke-opacity:0;r:30}
  }
  .pulse-ring-static{stroke-opacity:.45}

  .legend{position:fixed;top:calc(118px + env(safe-area-inset-top));left:12px;z-index:10;

    border-radius:12px;padding:8px 10px;font-size:11px;line-height:1.25}
  .legend .item{display:flex;align-items:center;gap:8px;padding:2px 0}
  .legend .dot{width:10px;height:10px;border-radius:9999px}
  .legend .hide{margin-top:4px;color:rgba(28,27,23,.4);background:transparent;border:0;padding:0;
    font-size:11px;text-decoration:underline;text-underline-offset:2px}

  .offline{position:fixed;bottom:58vh;right:12px;z-index:20;background:rgba(247,244,236,.95);
    border:1px solid rgba(28,27,23,.15);border-radius:9999px;padding:4px 10px;font-size:11px;display:none}

  section.sheet{position:fixed;left:0;right:0;bottom:0;z-index:30;background:var(--paper);
    border-top:1px solid rgba(28,27,23,.1);border-top-left-radius:18px;border-top-right-radius:18px;
    transition:height .28s ease-out;padding-bottom:env(safe-area-inset-bottom)}
  .sheet[data-snap=peek]{height:24vh}
  .sheet[data-snap=list]{height:58vh}
  .sheet[data-snap=detail]{height:92vh}
  .handle{width:100%;background:transparent;border:0;padding:16px 0 10px;display:flex;justify-content:center;min-height:48px}
  .handle .bar{display:block;width:48px;height:6px;border-radius:9999px;background:rgba(28,27,23,.2)}
  .sheet-body{height:calc(100% - 48px);overflow-y:auto;padding:0 12px 24px}
  .more{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:rgba(28,27,23,.6);
    background:transparent;border:0;padding:6px 4px;margin-top:6px;cursor:pointer;text-decoration:underline;text-underline-offset:2px}
  .pin-toggle{margin-top:8px;background:transparent;border:1px solid rgba(28,27,23,.2);
    border-radius:9999px;padding:8px 14px;font-size:12px;display:inline-flex;align-items:center;gap:6px;cursor:pointer}
  .pin-toggle.on{background:var(--zone-free);color:#fff;border-color:var(--zone-free)}

  .summary{font-size:11px;color:rgba(28,27,23,.6);padding:0 4px 8px}
  .list{display:flex;flex-direction:column;gap:8px;list-style:none;margin:0;padding:0}
  .card{width:100%;text-align:left;background:var(--paper);border:1px solid rgba(28,27,23,.1);
    border-radius:14px;padding:10px 12px}
  .card:active{background:rgba(28,27,23,.05)}
  .card .top{display:flex;gap:10px;align-items:flex-start}
  .card .dot{margin-top:5px;width:11px;height:11px;border-radius:9999px;flex:0 0 auto}
  .card .body{flex:1 1 auto;min-width:0}
  .card .title{display:flex;justify-content:space-between;gap:10px;align-items:baseline}
  .card .title h3{margin:0;font-size:14px;font-weight:500;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .card .walk{font-size:11px;color:rgba(28,27,23,.6);flex:0 0 auto}
  .card .meta{margin-top:4px;display:flex;flex-wrap:wrap;gap:4px 14px;
    font-size:11px;color:rgba(28,27,23,.7)}
  .card .meta .mute{color:rgba(28,27,23,.4)}

  .disclaimer{font-size:11px;line-height:1.35;color:rgba(28,27,23,.5);padding:14px 4px 0}

  .detail h2{margin:0;font-size:16px;font-weight:500}
  .detail .sub{font-size:11px;color:rgba(28,27,23,.6);margin-top:2px}
  .detail .back{font-size:12px;color:rgba(28,27,23,.6);background:transparent;border:0;padding:0;margin-bottom:8px;text-decoration:underline;text-underline-offset:2px}
  .detail h3{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;
    color:rgba(28,27,23,.5);margin:14px 0 8px}
  .rule{border:1px solid rgba(28,27,23,.1);border-radius:12px;padding:10px;margin-bottom:8px}
  .rule p{margin:0;font-size:13px}
  .rule .meta{margin-top:4px;font-size:11px;color:rgba(28,27,23,.6)}
  .rule details{margin-top:6px;font-size:11px;color:rgba(28,27,23,.6)}
  .rule a{font-size:11px;color:rgba(28,27,23,.7);text-decoration:underline;text-underline-offset:2px;margin-top:6px;display:inline-block}
  .prices{margin:0;padding:0;list-style:none;font-size:13px}
  .prices li{display:flex;justify-content:space-between;border-bottom:1px solid rgba(28,27,23,.05);padding:4px 0}
  .reportRow{display:flex;flex-wrap:wrap;gap:8px}
  .reportRow button{border:1px solid rgba(28,27,23,.15);background:transparent;border-radius:9999px;padding:6px 12px;font-size:12px}
  .reportRow button:hover{background:rgba(28,27,23,.05)}
  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(60vh + 12px);
    background:var(--ink);color:var(--paper);font-size:12px;padding:8px 12px;border-radius:9999px;
    z-index:50;opacity:0;transition:opacity .2s;pointer-events:none}
  .toast.show{opacity:1}
</style>
</head>
<body>
<div id="errorOverlay"></div>
<div id="pinnedBar" role="button" tabindex="0"></div>
<div id="map"></div>

<header class="app">
  <div class="row">
    <button id="logo" class="logo" title="Long-press = reset reports">P</button>
    <div class="search">
      <input id="search" type="search" placeholder="Where are you going?" autocomplete="off" />
      <ul id="searchResults" hidden></ul>
    </div>
  </div>
  <div class="row">
    <details class="filter-pop">
      <summary>Filter</summary>
      <div class="chips" id="filters">
        <button class="chip" data-key="free">Free now</button>
        <button class="chip" data-key="ev">EV charge</button>
        <button class="chip" data-key="covered">Covered</button>
        <button class="chip" data-key="disabled">Disabled</button>
      </div>
    </details>
    <button class="nearme" id="nearMeBtn" type="button">Near me</button>
  </div>
</header>

<div class="legend" id="legend">
  <div class="item"><span class="dot" style="background:var(--zone-free)"></span>Free now</div>
  <div class="item"><span class="dot" style="background:var(--zone-limited)"></span>Paid / time limit</div>
  <div class="item"><span class="dot" style="background:var(--zone-restricted)"></span>Don't park</div>
  <button class="hide" id="hideLegend">hide</button>
</div>

<div class="offline" id="offline">Offline</div>

<section class="sheet" data-snap="peek" id="sheet">
  <button class="handle" id="handle" aria-label="Toggle sheet"><span class="bar"></span></button>
  <div class="sheet-body" id="sheetBody"></div>
</section>

<div class="toast" id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin="anonymous"></script>
<script>
  // Surface load failures so a blank screen never happens silently on mobile
  (function(){
    function showErr(msg){
      var el=document.getElementById("errorOverlay");
      if(!el)return;
      el.innerHTML=msg;
      el.style.display="block";
    }
    window.addEventListener("error",function(e){
      var src=(e.target&&e.target.src)||(e.target&&e.target.href)||"";
      if(e.target&&(e.target.tagName==="SCRIPT"||e.target.tagName==="LINK")){
        showErr("Failed to load <code>"+src+"</code>. Check phone network or content blocker.");
      }else if(e.message){
        showErr("JS error: <code>"+e.message+"</code>");
      }
    },true);
    window.addEventListener("unhandledrejection",function(e){
      showErr("Async error: <code>"+(e.reason&&e.reason.message||e.reason)+"</code>");
    });
    window.__appBootError=showErr;
  })();
</script>

/* ====== Geo ====== */
const R=6371000;
function haversine(aLat,aLng,bLat,bLng){
  const toRad=d=>d*Math.PI/180;
  const dLat=toRad(bLat-aLat), dLng=toRad(bLng-aLng);
  const h=Math.sin(dLat/2)**2+Math.cos(toRad(aLat))*Math.cos(toRad(bLat))*Math.sin(dLng/2)**2;
  return 2*R*Math.asin(Math.sqrt(h));
}
function walkingMin(m){return Math.max(1,Math.round(m/80))}
function isInRogaland(lat,lng){
  return lat>=ROGALAND_BBOX.south&&lat<=ROGALAND_BBOX.north
    &&lng>=ROGALAND_BBOX.west&&lng<=ROGALAND_BBOX.east;
}
function clamp(n,lo,hi){return Math.max(lo,Math.min(hi,n))}

/* ====== Free-window logic ====== */
function minutesOfDay(d){return d.getHours()*60+d.getMinutes()}
function windowApplies(w,now){
  if(!w.daysOfWeek.includes(now.getDay()))return false;
  const m=minutesOfDay(now);
  return w.startMinute<=w.endMinute ? (m>=w.startMinute&&m<w.endMinute)
    : (m>=w.startMinute||m<w.endMinute);
}
function nextBoundary(w,now,kind){
  const target=kind==="start"?w.startMinute:w.endMinute;
  for(let off=0;off<8;off++){
    const c=new Date(now);c.setDate(now.getDate()+off);c.setHours(0,0,0,0);
    if(!w.daysOfWeek.includes(c.getDay()))continue;
    const t=new Date(c.getTime()+target*60000);
    if(t>now)return t;
  }
  return null;
}
function isFreeNow(rules,now){
  if(!rules.length)return false;
  for(const r of rules)if(r.freeWindow&&windowApplies(r.freeWindow,now))return true;
  for(const r of rules)if(r.enforcementWindow&&windowApplies(r.enforcementWindow,now))return false;
  return rules.some(r=>r.enforcementWindow);
}
function freeUntil(rules,now){
  for(const r of rules)if(r.freeWindow&&windowApplies(r.freeWindow,now))return nextBoundary(r.freeWindow,now,"end");
  for(const r of rules)if(r.enforcementWindow&&!windowApplies(r.enforcementWindow,now))return nextBoundary(r.enforcementWindow,now,"start");
  return null;
}
function paidUntil(rules,now){
  for(const r of rules)if(r.enforcementWindow&&windowApplies(r.enforcementWindow,now))return nextBoundary(r.enforcementWindow,now,"end");
  return null;
}
function fmtHHMM(d){return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0")}
function fmtRemain(target,now){
  const ms=target-now; if(ms<=0)return "0m";
  const total=Math.round(ms/60000), h=Math.floor(total/60), m=total%60;
  return h===0?`${m}m`:m===0?`${h}h`:`${h}h ${m}m`;
}

/* ====== Availability (heuristic) ====== */
const BASELINE={
  GARAGE:[20,15,12,10,12,18,28,42,55,65,75,80,82,80,78,74,70,62,52,40,30,25,22,20],
  LOT:[15,10,8,8,10,18,28,42,55,65,72,77,78,76,72,68,62,52,42,32,25,20,18,16],
  STREET:[30,22,18,16,18,25,40,55,68,75,80,82,84,82,78,74,70,62,52,42,38,35,33,32],
  RESIDENT:[92,94,95,95,94,90,82,72,62,55,52,52,52,55,58,62,68,75,82,86,88,90,91,92],
  EV:[20,15,12,12,15,22,35,50,62,70,75,78,78,75,70,62,55,48,40,32,28,25,22,20],
  DISABLED:[40,40,40,40,42,45,50,55,60,62,65,65,62,60,58,55,52,50,48,46,44,42,42,40],
  LOADING:[10,8,8,10,15,30,55,70,75,70,60,50,42,35,30,25,22,20,18,15,12,10,10,10],
};
function baselineFor(type,wd,h){
  const b=BASELINE[type]||BASELINE.STREET;
  const v=b[h]??50, weekend=wd===0||wd===6?0.7:1;
  return clamp(v*weekend,0,100);
}
function cruiseUplift(loc,now){
  const dStr=now.toISOString().slice(0,10);
  const call=CRUISE_CALLS.find(c=>c.date===dStr);
  if(!call)return 0;
  const d=haversine(loc.latitude,loc.longitude,58.971,5.731);
  if(d>800)return 0;
  return call.passengers>3500?30:call.passengers>2000?15:5;
}
function estimateOccupancy(loc,now){
  const baseline=baselineFor(loc.parkingType,now.getDay(),now.getHours());
  const overrides=loc.occupancyByHour||{};
  const overridden=overrides[now.getHours()];
  let percent= overridden!=null ? overridden*(now.getDay()===0||now.getDay()===6?0.7:1) : baseline;
  const reports=getReports().filter(r=>r.locationId===loc.slug&&now-new Date(r.createdAt)<4*3600*1000);
  if(reports.length){
    let sumW=0,sumWP=0;
    for(const r of reports){
      const dtMin=(now-new Date(r.createdAt))/60000;
      const w=Math.exp(-dtMin/30); sumW+=w; sumWP+=w*r.occupancyPercent;
    }
    const reportPercent=sumWP/sumW, reportWeight=1-Math.exp(-sumW/3);
    percent=(percent*0.4+reportPercent*reportWeight)/(0.4+reportWeight);
  }
  percent+=cruiseUplift(loc,now);
  return clamp(Math.round(percent),0,100);
}

/* ====== Zone status ====== */
const ZONE_COLOR={free:"#3A8A4A",limited:"#C68A1F",restricted:"#B0463C"};
function currentZoneStatus(loc,occ,now){
  if(["RESIDENT","DISABLED","LOADING"].includes(loc.parkingType))return "restricted";
  if(loc.rules.some(r=>r.permitRequired))return "restricted";
  if(occ>=98)return "restricted";
  if(isFreeNow(loc.rules,now)){
    const ends=freeUntil(loc.rules,now);
    if(ends && (ends-now)/60000<30)return "limited";
    return "free";
  }
  return "limited";
}

/* ====== Ranking ====== */
function priceScore(loc,now){
  if(isFreeNow(loc.rules,now))return 1;
  if(loc.prices.some(p=>p.priceType==="FREE"))return 1;
  const h=loc.prices.find(p=>p.priceType==="HOURLY");
  if(!h)return 0.5;
  return 1-clamp(h.amountNok/50,0,1);
}
function walkScore(m){return m==null?0.5:1-clamp(m/1000,0,1)}
function availScore(occ){return 1-clamp(occ/100,0,1)}
function simpleScore(rules){
  if(!rules.length)return 0.8;
  let p=0;
  for(const r of rules){
    if(r.maxStayMinutes!=null)p+=0.15;
    if(r.permitRequired)p+=0.4;
  }
  return clamp(1-p,0,1);
}
function freeWindowScore(rules,now){
  if(isFreeNow(rules,now))return 1;
  return 0;
}
function scoreFor(loc,walkM,occ,now){
  return 0.25*priceScore(loc,now)+0.25*walkScore(walkM)+0.25*availScore(occ)
    +0.10*simpleScore(loc.rules)+0.10*freeWindowScore(loc.rules,now)+0.05*0.7;
}

/* ====== User reports (localStorage) ====== */
function getReports(){

function addReport(locationId,occupancyPercent){

  all.push({locationId,occupancyPercent,createdAt:new Date().toISOString()});
  while(all.length>500)all.shift();
  localStorage.setItem("parking-reports",JSON.stringify(all));
}

/* ====== Notify ====== */
const notify={
  supported:typeof window!=="undefined" && "Notification" in window,
  asked:false,
  async ensurePermission(){
    if(!this.supported)return false;
    if(Notification.permission==="granted")return true;
    if(Notification.permission==="denied")return false;
    if(this.asked)return false;
    this.asked=true;
    try{const r=await Notification.requestPermission();return r==="granted"}catch{return false}
  },
  fire(title,body,tag){
    if(!this.supported||Notification.permission!=="granted")return;
    try{new Notification(title,{body,tag})}catch{}
  }
};

/* ====== Helpers used by notifications ====== */
function nextFreeStart(rules,now){
  let best=null;
  for(const r of rules){
    if(!r.freeWindow)continue;
    if(windowApplies(r.freeWindow,now))continue;
    const t=nextBoundary(r.freeWindow,now,"start");
    if(t&&(!best||t<best))best=t;
  }
  return best;
}
function getNotifiedFree(){try{return JSON.parse(localStorage.getItem("parking-notified-free")||"{}")}catch{return{}}}
function setNotifiedFree(map){localStorage.setItem("parking-notified-free",JSON.stringify(map))}
function getNotifiedNear(){try{return JSON.parse(localStorage.getItem("parking-notified-near")||"{}")}catch{return{}}}
function setNotifiedNear(map){localStorage.setItem("parking-notified-near",JSON.stringify(map))}

/* ====== Map (Leaflet — works on every iOS/Android phone, no WebGL needed) ====== */
let map=null;
const markersBySlug={};
const prevZoneStatus={};
const newlyFreeUntil={};
const pulseBySlug={};
const freeStartTimeouts={};
let originMarker=null;
let userPosMarker=null;
let geoWatchId=null;

function toLatLngRing(ring){return ring.map(([lng,lat])=>[lat,lng])}

function initMap(){
  if(typeof L==="undefined"){
    if(window.__appBootError)window.__appBootError("Map library failed to load. Refresh, or disable any content blocker.");
    return;
  }
  try{
    map=L.map("map",{
      center:[DEFAULT_CENTER[1],DEFAULT_CENTER[0]],
      zoom:DEFAULT_ZOOM,minZoom:8,maxZoom:18,
      maxBounds:[[ROGALAND_BBOX.south,ROGALAND_BBOX.west],[ROGALAND_BBOX.north,ROGALAND_BBOX.east]],
      maxBoundsViscosity:1.0,
      zoomControl:true,
      attributionControl:true,
      tap:true,
    });
    const tiles=L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png",{
      maxZoom:19,
      attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      crossOrigin:true,
    }).addTo(map);
    let tileErrCount=0;
    tiles.on("tileerror",(e)=>{
      tileErrCount++;
      if(tileErrCount===5 && window.__appBootError){
        window.__appBootError("Map tiles aren't loading. Check phone network or a content blocker. URL: <code>"+(e.tile&&e.tile.src||"")+"</code>");
      }
    });

    L.polygon([toLatLngRing(WORLD_RING),toLatLngRing(ROGALAND_POLY)],{
      stroke:false,fillColor:"#1C1B17",fillOpacity:0.32,interactive:false,
    }).addTo(map);

    pushItemsToMap();
  }catch(err){
    if(window.__appBootError)window.__appBootError("Map init failed: <code>"+(err&&err.message||err)+"</code>");
  }
}

function colorFor(status){
  return status==="free"?"#3A8A4A":status==="limited"?"#C68A1F":status==="restricted"?"#B0463C":"#888";
}

function pushItemsToMap(){
  if(!map)return;
  const now=new Date();
  const nowMs=now.getTime();
  for(const loc of LOCATIONS){
    const occ=estimateOccupancy(loc,now);
    const status=currentZoneStatus(loc,occ,now);
    const selected=loc.slug===state.selectedSlug;
    const color=colorFor(status);
    let m=markersBySlug[loc.slug];
    if(!m){
      m=L.circleMarker([loc.latitude,loc.longitude],{
        radius:selected?12:9,
        color:"#F7F4EC",
        weight:selected?3:1.5,
        fillColor:color,
        fillOpacity:0.9,
        bubblingMouseEvents:false,
      }).addTo(map);
      m.on("click",()=>selectSlug(loc.slug));
      markersBySlug[loc.slug]=m;
    }else{
      m.setStyle({
        radius:selected?12:9,
        weight:selected?3:1.5,
        fillColor:color,
      });
    }

    // Newly-free pulse: detect a transition INTO free
    const prev=prevZoneStatus[loc.slug];
    if(prev && prev!=="free" && status==="free"){
      newlyFreeUntil[loc.slug]=nowMs+120_000;
    }
    prevZoneStatus[loc.slug]=status;

    // Manage pulse layer
    const expiresAt=newlyFreeUntil[loc.slug];
    if(expiresAt && nowMs<expiresAt){
      if(!pulseBySlug[loc.slug]){
        const ring=L.circleMarker([loc.latitude,loc.longitude],{
          radius:9,color:"#3A8A4A",weight:2,fill:false,opacity:0.85,
          interactive:false,className:"pulse-ring",
        }).addTo(map);
        pulseBySlug[loc.slug]=ring;
      }
    }else if(pulseBySlug[loc.slug]){
      map.removeLayer(pulseBySlug[loc.slug]);
      delete pulseBySlug[loc.slug];
      delete newlyFreeUntil[loc.slug];
    }

    // Schedule "Free in 1 min" notification
    const start=nextFreeStart(loc.rules,now);
    if(start){
      const fireAt=start.getTime()-60_000;
      const startKey=start.toISOString();
      const notified=getNotifiedFree();
      const existing=freeStartTimeouts[loc.slug];
      if(fireAt>nowMs && notified[loc.slug]!==startKey){
        if(!existing || existing.key!==startKey){
          if(existing)clearTimeout(existing.timer);
          const delay=Math.min(fireAt-nowMs, 2_147_000_000); // cap setTimeout
          const timer=setTimeout(()=>{
            notify.fire("Free parking starts in 1 min", loc.name, "free-"+loc.slug);
            const n=getNotifiedFree(); n[loc.slug]=startKey; setNotifiedFree(n);
          },delay);
          freeStartTimeouts[loc.slug]={timer,key:startKey};
        }
      }
    }
  }
  const origin=state.origin;
  if(originMarker){map.removeLayer(originMarker);originMarker=null}
  if(origin){
    originMarker=L.circleMarker([origin.lat,origin.lng],{
      radius:6,color:"#F7F4EC",weight:2,fillColor:"#1C1B17",fillOpacity:1,
    }).addTo(map);
  }
  if(state.userPos){
    if(!userPosMarker){
      userPosMarker=L.circleMarker([state.userPos.lat,state.userPos.lng],{
        radius:7,color:"#F7F4EC",weight:2,fillColor:"#1C1B17",fillOpacity:1,interactive:false,
      }).addTo(map);
    }else{
      userPosMarker.setLatLng([state.userPos.lat,state.userPos.lng]);
    }
  }
  renderPinnedBar();
}

/* ====== Ranked list ====== */
function rankedItems(now){
  const items=LOCATIONS.map(loc=>{
    const walkM=state.origin?Math.round(haversine(state.origin.lat,state.origin.lng,loc.latitude,loc.longitude)):null;
    const occ=estimateOccupancy(loc,now);
    const zone=currentZoneStatus(loc,occ,now);
    const free=isFreeNow(loc.rules,now);
    const fu=free?freeUntil(loc.rules,now):null;
    const pu=!free?paidUntil(loc.rules,now):null;
    return {loc,walkM,occ,zone,free,freeUntil:fu,paidUntil:pu,
      score:scoreFor(loc,walkM,occ,now)};
  });
  const F=state.filters;
  let filtered=items.filter(it=>{
    const l=it.loc;
    if(F.has("free")&&!it.free&&!l.prices.some(p=>p.priceType==="FREE"))return false;
    if(F.has("ev")&&!(l.capacityCharging>0))return false;
    if(F.has("covered")&&!l.covered)return false;
    if(F.has("disabled")&&!(l.capacityDisabled>0))return false;
    return true;
  });
  filtered.sort((a,b)=>b.score-a.score);
  return filtered;
}

/* ====== Renderers ====== */
function renderSheet(){
  const body=document.getElementById("sheetBody");
  if(state.sheetSnap==="detail"&&state.selectedSlug){
    body.innerHTML=renderDetail(state.selectedSlug);
    wireDetailEvents();
  }else{
    body.innerHTML=renderList();
    wireListEvents();
  }
}

function renderList(){
  const now=new Date();
  const items=rankedItems(now);
  if(state.sheetSnap==="peek"){
    const top=items[0];
    if(!top){
      return `<div class="summary">No parking found</div>`;
    }
    return `
      <div class="summary">Best pick now</div>
      <ul class="list">${renderCard(top,now)}</ul>
      <button class="more" id="seeMore">Show all ${items.length} ↑</button>
    `;
  }
  const summary=`${items.length} parking ${items.length===1?"spot":"spots"} nearby`;
  const cards=items.map(it=>renderCard(it,now)).join("");
  return `
    <div class="summary">${summary}</div>
    <ul class="list">${cards}</ul>
    <p class="disclaimer">Always check signs on site. Parking rules may change.</p>
  `;
}

function renderCard(it,now){
  const {loc}=it;
  const priceLabel=cardPriceLabel(loc,it,now);
  const occLabel=occupancyLabel(it.occ);
  const countdown=countdownLabel(it,now);
  const walk=it.walkM!=null?`<span class="walk">${walkingMin(it.walkM)} min walk</span>`:"";
  return `<li><button class="card" data-slug="${loc.slug}">
    <div class="top">
      <span class="dot" style="background:${ZONE_COLOR[it.zone]}"></span>
      <div class="body">
        <div class="title"><h3>${escapeHtml(loc.name)}</h3>${walk}</div>
        <div class="meta">
          <span>${priceLabel}</span>
          <span>${occLabel}<span class="mute"> · est ${it.occ}%</span></span>
          ${countdown?`<span>${countdown}</span>`:""}
        </div>
      </div>
    </div>
  </button></li>`;
}

function cardPriceLabel(loc,it,now){
  if(it.free)return "Free now";
  const h=loc.prices.find(p=>p.priceType==="HOURLY");
  if(h&&h.amountNok>0)return `${h.amountNok} NOK/h`;
  if(loc.prices.some(p=>p.priceType==="FREE"))return "Free (with limits)";
  if(loc.parkingType==="RESIDENT")return "Permit only";
  return "Price unknown";
}
function occupancyLabel(o){
  if(o<40)return "Likely open";
  if(o<75)return "Half full";
  if(o<95)return "Filling up";
  return "Likely full";
}
function countdownLabel(it,now){
  if(it.free&&it.freeUntil&&it.freeUntil>now)
    return `Free until ${fmtHHMM(it.freeUntil)}<span class="mute"> · ${fmtRemain(it.freeUntil,now)} left</span>`;
  if(!it.free&&it.paidUntil&&it.paidUntil>now)
    return `Paid until ${fmtHHMM(it.paidUntil)}`;
  return "";
}

function renderDetail(slug){
  const loc=LOCATIONS.find(l=>l.slug===slug); if(!loc)return "";
  const now=new Date();
  const occ=estimateOccupancy(loc,now);
  const zone=currentZoneStatus(loc,occ,now);
  const free=isFreeNow(loc.rules,now);
  const fu=free?freeUntil(loc.rules,now):null;
  const pu=!free?paidUntil(loc.rules,now):null;
  const walkM=state.origin?Math.round(haversine(state.origin.lat,state.origin.lng,loc.latitude,loc.longitude)):null;
  const countdown = (free&&fu)
    ? `Free until ${fmtHHMM(fu)} · ${fmtRemain(fu,now)} left`
    : (!free&&pu) ? `Paid until ${fmtHHMM(pu)}` : "";
  const rules=loc.rules.map(renderRule).join("");
  const prices=loc.prices.map(p=>`<li><span>${p.priceType.toLowerCase()}</span>
    <span>${p.priceType==="FREE"?"—":`${p.amountNok} NOK`}
      ${p.startsAt&&p.endsAt?`<span class="mute" style="color:rgba(28,27,23,.4)"> (${p.startsAt}–${p.endsAt})</span>`:""}
    </span></li>`).join("");
  const tipsHtml=nearbyTips(loc).map(t=>`
    <li style="border:1px solid rgba(28,27,23,.1);border-radius:12px;padding:10px;margin-bottom:8px">
      <div style="font-size:13px;font-weight:500">${escapeHtml(t.title)}</div>
      <div style="font-size:11px;color:rgba(28,27,23,.7);margin-top:4px">${escapeHtml(t.body)}</div>
    </li>`).join("");
  const meta=[
    loc.capacity!=null?`${loc.capacity} spaces`:null,
    loc.capacityDisabled!=null?`${loc.capacityDisabled} disabled`:null,
    loc.capacityCharging!=null?`${loc.capacityCharging} EV chargers`:null,
    loc.covered?"covered":null,
  ].filter(Boolean).join(" · ");
  return `
    <div class="detail">
      <button class="back" id="backBtn">← Back to list</button>
      <div style="display:flex;gap:10px;align-items:flex-start">
        <span style="margin-top:5px;width:11px;height:11px;border-radius:9999px;background:${ZONE_COLOR[zone]};flex:0 0 auto"></span>
        <div>
          <h2>${escapeHtml(loc.name)}</h2>
          <div class="sub">
            ${loc.parkingType.toLowerCase()} ·
            <span style="color:${ZONE_COLOR[zone]}">${zoneLabel(zone)}</span>
            ${walkM!=null?` · ${walkingMin(walkM)} min walk`:""}
          </div>
          ${countdown?`<div style="margin-top:4px;font-size:13px">${countdown}</div>`:""}
          <button id="pinToggle" type="button" class="pin-toggle ${state.pinnedSlug===slug?"on":""}">
            ${state.pinnedSlug===slug?"✓ Reminding while free":"🔔 Remind me while free"}
          </button>
        </div>
      </div>
      <p class="disclaimer">Always check signs on site. Parking rules may change.</p>
      ${rules?`<h3>Rules</h3>${rules}`:""}
      ${prices?`<h3>Prices</h3><ul class="prices">${prices}</ul>`:""}
      ${meta?`<div style="margin-top:14px;font-size:11px;color:rgba(28,27,23,.6)">${escapeHtml(meta)}</div>`:""}
      ${loc.operator?`<div style="font-size:11px;color:rgba(28,27,23,.6)">Operator: ${escapeHtml(loc.operator)}</div>`:""}
      ${loc.sourceUrl?`<a href="${escapeAttr(loc.sourceUrl)}" target="_blank" rel="noreferrer" style="font-size:11px;color:rgba(28,27,23,.7);text-decoration:underline;text-underline-offset:2px">Source</a>`:""}
      ${tipsHtml?`<h3>Local tips</h3><ul style="list-style:none;margin:0;padding:0">${tipsHtml}</ul>`:""}
      <h3>Report what you see</h3>
      <div class="reportRow">
        <button data-occ="10">Plenty open</button>
        <button data-occ="50">Half full</button>
        <button data-occ="90">Almost full</button>
        <button data-occ="100">Full</button>
      </div>
    </div>
  `;
}
function renderRule(r){
  return `<div class="rule">
    <p>${escapeHtml(r.ruleTextSimple)}</p>
    ${r.freeWindow?`<div class="meta">Free: ${daysLabel(r.freeWindow.daysOfWeek)} · ${fmtMin(r.freeWindow.startMinute)}–${fmtMin(r.freeWindow.endMinute)}</div>`:""}
    ${r.enforcementWindow?`<div class="meta">Paid: ${daysLabel(r.enforcementWindow.daysOfWeek)} · ${fmtMin(r.enforcementWindow.startMinute)}–${fmtMin(r.enforcementWindow.endMinute)}</div>`:""}
    ${r.maxStayMinutes!=null?`<div class="meta">Max stay: ${r.maxStayMinutes} min</div>`:""}
    ${r.permitRequired?`<div class="meta">Permit required</div>`:""}
    <details><summary>Original sign text</summary><div style="margin-top:4px;white-space:pre-line">${escapeHtml(r.ruleTextOriginal)}</div></details>
  </div>`;
}
function fmtMin(m){return String(Math.floor(m/60)).padStart(2,"0")+":"+String(m%60).padStart(2,"0")}
function daysLabel(dow){
  if(dow.length===7)return "Every day";
  if(dow.length===5&&[1,2,3,4,5].every(d=>dow.includes(d)))return "Mon–Fri";
  if(dow.length===2&&dow.includes(0)&&dow.includes(6))return "Weekends";
  const names=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  return dow.map(d=>names[d]).join(", ");
}
function zoneLabel(z){return z==="free"?"Free now":z==="limited"?"Paid / time limit":"Don't park"}
function nearbyTips(loc){
  return TIPS.map(t=>({...t,d:haversine(loc.latitude,loc.longitude,t.latitude,t.longitude)}))
    .filter(t=>t.d<1500).sort((a,b)=>a.d-b.d).slice(0,3);
}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
function escapeAttr(s){return escapeHtml(s)}

/* ====== Wiring ====== */
function wireListEvents(){
  document.querySelectorAll(".card[data-slug]").forEach(btn=>{
    btn.addEventListener("click",()=>selectSlug(btn.dataset.slug));
  });
  document.getElementById("seeMore")?.addEventListener("click",()=>{
    state.sheetSnap="list"; applySheet(); renderSheet();
  });
}
function wireDetailEvents(){
  document.getElementById("backBtn")?.addEventListener("click",()=>{
    state.sheetSnap="list"; state.selectedSlug=null; applySheet(); renderSheet(); pushItemsToMap();
  });
  document.getElementById("pinToggle")?.addEventListener("click",async ()=>{
    if(state.pinnedSlug===state.selectedSlug){
      state.pinnedSlug=null; localStorage.removeItem("parking-pinned");
      toast("Reminder off");
    }else{
      const ok=await notify.ensurePermission();
      state.pinnedSlug=state.selectedSlug;
      localStorage.setItem("parking-pinned",state.pinnedSlug);
      toast(ok?"Reminding while free":"Pinned (enable notifications for alerts)");
    }
    renderSheet(); renderPinnedBar();
  });
  document.querySelectorAll(".reportRow button").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const occ=Number(btn.dataset.occ);
      addReport(state.selectedSlug,occ);
      toast(`Reported · est now ${estimateOccupancy(LOCATIONS.find(l=>l.slug===state.selectedSlug),new Date())}%`);
      pushItemsToMap();
      renderSheet();
    });
  });
}
function selectSlug(slug){
  state.selectedSlug=slug; state.sheetSnap="detail"; applySheet(); renderSheet(); pushItemsToMap();
  const loc=LOCATIONS.find(l=>l.slug===slug);
  if(loc&&map)map.setView([loc.latitude,loc.longitude],Math.max(map.getZoom(),14),{animate:true});
}
function applySheet(){document.getElementById("sheet").dataset.snap=state.sheetSnap}

/* ====== Pinned bar ====== */
function renderPinnedBar(){
  const bar=document.getElementById("pinnedBar");
  const slug=state.pinnedSlug;
  const loc=slug?LOCATIONS.find(l=>l.slug===slug):null;
  const now=new Date();
  if(!loc || !isFreeNow(loc.rules,now)){
    bar.classList.remove("shown"); document.body.classList.remove("pinned"); return;
  }
  const fu=freeUntil(loc.rules,now);
  const remain=fu?fmtRemain(fu,now):"";
  bar.innerHTML=`<span class="name">🅿 ${escapeHtml(loc.name)}</span><span class="left">Free ${remain} left</span>`;
  bar.classList.add("shown"); document.body.classList.add("pinned");
}
const pinnedBarEl=document.getElementById("pinnedBar");
let pinPressTimer=null;
pinnedBarEl.addEventListener("click",()=>{ if(state.pinnedSlug){ selectSlug(state.pinnedSlug) } });
pinnedBarEl.addEventListener("touchstart",()=>{ pinPressTimer=setTimeout(()=>{
  state.pinnedSlug=null; localStorage.removeItem("parking-pinned"); renderPinnedBar(); renderSheet(); toast("Unpinned");
},700) },{passive:true});
pinnedBarEl.addEventListener("touchend",()=>clearTimeout(pinPressTimer));
pinnedBarEl.addEventListener("touchmove",()=>clearTimeout(pinPressTimer));

/* ====== Near me (geofence) ====== */
const nearMeBtn=document.getElementById("nearMeBtn");
function applyNearMeBtn(){nearMeBtn.classList.toggle("on",state.watchNearby)}
applyNearMeBtn();
function startGeoWatch(){
  if(!("geolocation" in navigator)) return;
  geoWatchId=navigator.geolocation.watchPosition(
    pos=>{
      state.userPos={lat:pos.coords.latitude,lng:pos.coords.longitude};
      pushItemsToMap();
      checkNearby();
    },
    err=>{ toast("Location: "+err.message); },
    {enableHighAccuracy:false,maximumAge:30000,timeout:15000}
  );
}
function stopGeoWatch(){
  if(geoWatchId!=null){navigator.geolocation.clearWatch(geoWatchId);geoWatchId=null}
  state.userPos=null;
  if(userPosMarker){map.removeLayer(userPosMarker);userPosMarker=null}
}
function checkNearby(){
  if(!state.userPos)return;
  const now=Date.now();
  const seen=getNotifiedNear();
  for(const loc of LOCATIONS){
    const d=haversine(state.userPos.lat,state.userPos.lng,loc.latitude,loc.longitude);
    if(d>150)continue;
    const last=seen[loc.slug]||0;
    if(now-last < 30*60*1000) continue;
    notify.fire("Parking nearby", `${loc.name} · ${Math.round(d)} m away`, "near-"+loc.slug);
    seen[loc.slug]=now;
  }
  setNotifiedNear(seen);
}
nearMeBtn.addEventListener("click",async ()=>{
  if(state.watchNearby){
    state.watchNearby=false; localStorage.setItem("parking-watch-near","0");
    stopGeoWatch(); applyNearMeBtn(); toast("Near me off");
  }else{
    const ok=await notify.ensurePermission();
    state.watchNearby=true; localStorage.setItem("parking-watch-near","1");
    startGeoWatch(); applyNearMeBtn();
    toast(ok?"Watching nearby":"Tracking on (enable notifications for alerts)");
  }
});
if(state.watchNearby)startGeoWatch();

/* ====== Filters ====== */
document.getElementById("filters").addEventListener("click",e=>{
  const t=e.target.closest(".chip"); if(!t)return;
  const k=t.dataset.key;
  if(state.filters.has(k))state.filters.delete(k); else state.filters.add(k);
  t.classList.toggle("on");
  renderSheet();
});

/* ====== Sheet drag ====== */
const sheetEl=document.getElementById("sheet");
const handle=document.getElementById("handle");
let dragStart=null;
handle.addEventListener("click",()=>{
  if(state.sheetSnap==="peek")state.sheetSnap="list";
  else if(state.sheetSnap==="list")state.sheetSnap="detail";
  else state.sheetSnap="list";
  applySheet(); renderSheet();
});
handle.addEventListener("touchstart",e=>{dragStart=e.touches[0]?.clientY??null},{passive:true});
handle.addEventListener("touchend",e=>{
  const end=e.changedTouches[0]?.clientY??null;
  if(dragStart==null||end==null)return;
  const dy=end-dragStart; dragStart=null;
  if(dy<-30){state.sheetSnap=state.sheetSnap==="peek"?"list":"detail";applySheet();renderSheet();}
  else if(dy>30){state.sheetSnap=state.sheetSnap==="detail"?"list":"peek";applySheet();renderSheet();}
});

/* ====== Search (Nominatim, Rogaland-bounded) ====== */
const searchInput=document.getElementById("search");
const searchResults=document.getElementById("searchResults");
let searchTimer=null;
searchInput.addEventListener("input",()=>{
  clearTimeout(searchTimer);
  const q=searchInput.value.trim();
  if(q.length<2){searchResults.hidden=true;searchResults.innerHTML="";return}
  searchTimer=setTimeout(async()=>{
    try{
      const vb=`${ROGALAND_BBOX.west},${ROGALAND_BBOX.north},${ROGALAND_BBOX.east},${ROGALAND_BBOX.south}`;
      const url=`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=8&viewbox=${vb}&bounded=1&countrycodes=no`;
      const resp=await fetch(url,{headers:{"Accept":"application/json"}});
      if(!resp.ok)return;
      const rows=await resp.json();
      const list=rows
        .map(r=>({label:r.display_name,lat:Number(r.lat),lng:Number(r.lon)}))
        .filter(r=>isInRogaland(r.lat,r.lng));
      if(!list.length){searchResults.hidden=true;return}
      searchResults.innerHTML=list.map((r,i)=>`<li><button data-i="${i}">${escapeHtml(r.label)}</button></li>`).join("");
      searchResults.hidden=false;
      searchResults.querySelectorAll("button").forEach((btn,i)=>{
        btn.addEventListener("mousedown",e=>{e.preventDefault();pickOrigin(list[i])});
      });
    }catch{/* offline; ignore */}
  },250);
});
searchInput.addEventListener("blur",()=>setTimeout(()=>{searchResults.hidden=true},150));
function pickOrigin(p){
  state.origin={lat:p.lat,lng:p.lng,label:p.label};
  searchInput.value=p.label.split(",")[0]||p.label;
  searchResults.hidden=true;
  if(map)map.setView([p.lat,p.lng],14,{animate:true});
  pushItemsToMap();
  state.sheetSnap="list"; applySheet(); renderSheet();
}

/* ====== Logo long-press → wipe reports ====== */
const logoBtn=document.getElementById("logo");
let logoTimer=null;
function startLogo(){logoTimer=setTimeout(()=>{
  clearReports(); toast("Reports cleared"); pushItemsToMap(); renderSheet();
},800)}
function cancelLogo(){clearTimeout(logoTimer)}
logoBtn.addEventListener("touchstart",startLogo,{passive:true});
logoBtn.addEventListener("touchend",cancelLogo);
logoBtn.addEventListener("touchmove",cancelLogo);
logoBtn.addEventListener("mousedown",startLogo);
logoBtn.addEventListener("mouseup",cancelLogo);
logoBtn.addEventListener("mouseleave",cancelLogo);

/* ====== Legend ====== */
document.getElementById("hideLegend").addEventListener("click",()=>{
  document.getElementById("legend").style.display="none";
});

/* ====== Toast ====== */
const toastEl=document.getElementById("toast");
function toast(msg){
  toastEl.textContent=msg; toastEl.classList.add("show");
  setTimeout(()=>toastEl.classList.remove("show"),1800);
}

/* ====== Offline indicator ====== */
function updateOffline(){document.getElementById("offline").style.display=navigator.onLine?"none":"block"}
window.addEventListener("online",updateOffline);
window.addEventListener("offline",updateOffline);
updateOffline();

/* ====== Time tick: repaint zones every 60s, re-render list every 30s ====== */
setInterval(()=>{pushItemsToMap();if(state.sheetSnap!=="detail")renderSheet();renderPinnedBar()},60000);
setInterval(()=>{if(state.sheetSnap!=="detail")renderSheet();renderPinnedBar()},15000);

/* ====== Boot ====== */
try{ initMap(); }catch(e){ if(window.__appBootError)window.__appBootError("Boot error: <code>"+(e&&e.message||e)+"</code>"); }
try{ renderSheet(); renderPinnedBar(); }catch(e){ if(window.__appBootError)window.__appBootError("Render error: <code>"+(e&&e.message||e)+"</code>"); }
</script>
</body>
</html>
