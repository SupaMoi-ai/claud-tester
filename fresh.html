<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>Updating BRO CODE…</title>
<style>
  html, body { margin: 0; height: 100%; background: #0D1117; color: #F5ECD7; font-family: -apple-system, system-ui, sans-serif; }
  body { display: grid; place-items: center; padding: 24px; }
  .box { text-align: center; max-width: 360px; }
  .badge { width: 64px; height: 64px; background: #C8322C; border-radius: 12px; display: grid; place-items: center; margin: 0 auto 20px; font-family: Impact, sans-serif; font-size: 28px; }
  h1 { font-family: Impact, sans-serif; letter-spacing: 0.04em; font-size: 28px; margin: 0 0 8px; }
  p  { color: rgba(245,236,215,0.75); line-height: 1.45; margin: 0 0 16px; font-size: 15px; }
  .ok { color: #3DAA6A; font-family: 'Courier New', monospace; font-size: 11px; letter-spacing: 0.18em; margin-top: 12px; }
  .err{ color: #E07A4A; font-family: 'Courier New', monospace; font-size: 11px; letter-spacing: 0.18em; margin-top: 12px; }
  a.btn { display: inline-block; margin-top: 14px; padding: 10px 18px; background: #C8322C; color: #F5ECD7; text-decoration: none; border-radius: 4px; font-family: Impact, sans-serif; letter-spacing: 0.08em; }
</style>
</head>
<body>
<div class="box">
  <div class="badge">BC</div>
  <h1>UPDATING BRO CODE</h1>
  <p>Wiping the old service worker and cache. You'll bounce to the new version in a second.</p>
  <div id="status" class="ok">// working…</div>
  <a id="fallback" class="btn" href="app.html?nocache=1" style="display:none">OPEN BRO CODE →</a>
</div>
<script>
(async () => {
  const status = document.getElementById('status');
  const fallback = document.getElementById('fallback');
  let wiped = 0, errors = 0;
  try {
    if ('serviceWorker' in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      for (const r of regs) { try { await r.unregister(); wiped++; } catch { errors++; } }
    }
    if ('caches' in window) {
      const keys = await caches.keys();
      for (const k of keys) { try { await caches.delete(k); wiped++; } catch { errors++; } }
    }
  } catch (e) { errors++; }
  status.textContent = `// wiped ${wiped} caches/workers` + (errors ? ` (${errors} errs)` : '');
  setTimeout(() => {
    fallback.style.display = 'inline-block';
    location.replace('app.html?fresh=' + Date.now());
  }, 700);
})();
</script>
</body>
</html>
