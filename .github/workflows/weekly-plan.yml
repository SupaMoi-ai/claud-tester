name: Weekly school plan (2B)

on:
  workflow_dispatch:
    inputs:
      dump:
        description: "Discovery run: save section HTML + .docx as artifacts, no email"
        type: boolean
        default: false
      force:
        description: "Send email even if the plan is unchanged"
        type: boolean
        default: false
  schedule:
    # 05:00 UTC every Monday ~= 07:00 Europe/Oslo (CEST) / 06:00 (CET).
    # NOTE: scheduled runs only fire when this file is on the default branch.
    - cron: "0 5 * * 1"

permissions:
  contents: write

concurrency:
  group: weekly-plan
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run scraper
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT: ${{ secrets.RECIPIENT }}
          MINSKOLE_USER: ${{ secrets.MINSKOLE_USER }}
          MINSKOLE_PASS: ${{ secrets.MINSKOLE_PASS }}
        run: |
          python scraper.py ${{ inputs.dump && '--dump' || '' }} ${{ inputs.force && '--force' || '' }}

      - name: Upload discovery artifacts
        if: ${{ always() && inputs.dump }}
        uses: actions/upload-artifact@v4
        with:
          name: discovery-debug
          path: debug/
          if-no-files-found: ignore

      - name: Commit updated state
        if: ${{ !inputs.dump }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/state.json
          if ! git diff --cached --quiet; then
            git commit -m "Update weekly plan state"
            git push
          else
            echo "No state change to commit."
          fi
